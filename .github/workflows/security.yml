name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # 毎日午前2時
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'AnomalyDetection/**/*.csproj'
      - 'AnomalyDetection/angular/package.json'
      - 'AnomalyDetection/angular/yarn.lock'

jobs:
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: .NET vulnerability scan
        working-directory: AnomalyDetection
        run: |
          dotnet list package --vulnerable --include-transitive --format json \
            > ../dotnet-vulnerabilities.json
          cat ../dotnet-vulnerabilities.json
        continue-on-error: true

      - name: Node.js audit
        working-directory: AnomalyDetection/angular
        run: npm audit --audit-level moderate --json > ../../node-vulnerabilities.json || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            dotnet-vulnerabilities.json
            node-vulnerabilities.json
            trivy-results.sarif

  docker-image-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scan
        uses: docker/build-push-action@v5
        with:
          context: AnomalyDetection
          file: AnomalyDetection/src/AnomalyDetection.HttpApi.Host/Dockerfile
          push: false
          tags: anomaly-detection-backend:scan
          load: true
          cache-from: type=gha

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: anomaly-detection-backend:scan
          format: sarif
          output: backend-image-scan.sarif

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: backend-image-scan.sarif
